name: Deploy Sanity Studio

on:
  push:
    branches: [main]
    paths:
      - 'studio/**'  # Only run when Studio files change

permissions:
  contents: read

jobs:
  deploy-studio:
    name: Deploy Sanity Studio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.x
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build Studio
        run: npm run build --workspace=studio
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ secrets.SANITY_STUDIO_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ secrets.SANITY_STUDIO_DATASET }}

      - name: Deploy to Sanity
        run: npm run deploy --workspace=studio -- dist --yes
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
