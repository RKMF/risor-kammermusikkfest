name: Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22.22.2
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Report outdated packages
        run: npm run outdated:deps
        continue-on-error: true

      - name: Report high production vulnerabilities on scheduled runs
        if: github.event_name == 'schedule'
        run: |
          set +e
          npm run audit:deps:ci
          status=$?
          {
            echo "## Dependency audit"
            echo
            echo "Scheduled runs report unresolved production vulnerabilities without failing the workflow."
            echo
            if [ "$status" -eq 0 ]; then
              echo "Audit passed with no high production vulnerabilities."
            else
              echo "Audit reported unresolved high production vulnerabilities. Review the job log and plan targeted maintenance."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Fail on high production vulnerabilities for manual runs
        if: github.event_name != 'schedule'
        run: npm run audit:deps:ci
